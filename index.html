<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Campus Merch Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <script src="script.js"></script>

  <header id="navbar" class="navbar">
    <div class="logo">Campus<span>Merch</span></div>

    <nav id="navLinks" class="nav-links">
      <a href="#home" class="nav-link active">Home</a>
      <a href="#shop" class="nav-link">Shop</a>
      <a href="#customize" class="nav-link">Customize</a>
      <a href="#clubs" class="nav-link">Clubs</a>
      <a href="#" class="nav-link cart-btn">Cart <span id="cartCount">0</span></a>
    </nav>

    <div id="hamburger" class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </header>

  <section id="home" class="hero">
    <div class="hero-content">
      <h1>Wear Your Campus Identity</h1>
      <p>Premium merchandise crafted for bold students.</p>
      <button class="btn-primary">Explore Merch</button>
    </div>
  </section>

  <section id="shop" class="products">
    <h2 class="section-title">Featured Products</h2>
    <div id="productGrid" class="product-grid"></div>
  </section>

  <section id="customize" class="customize">
    <h2 class="section-title">Customize Your Merch</h2>

    <div class="customize-container">
      <div class="custom-form">
        <input type="text" id="customName" placeholder="Enter Your Name">

        <select id="customDept">
          <option value="">Select Department</option>
          <option value="CSE">CSE</option>
          <option value="ECE">ECE</option>
          <option value="MECH">MECH</option>
        </select>

        <select id="customYear">
          <option value="">Select Year</option>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
          <option value="2027">2027</option>
        </select>

        <button id="previewBtn" class="btn-secondary">Preview</button>
      </div>

      <div class="custom-preview">
        <div class="preview-box">
          <p id="previewText">Your Name | Dept | Year</p>
        </div>
      </div>
    </div>
  </section>

  <section id="clubs" class="clubs">
    <h2 class="section-title">Trending Campus Clubs</h2>

    <div class="club-grid">
      <div class="club-card">Tech Club</div>
      <div class="club-card">Cultural Club</div>
      <div class="club-card">Sports Club</div>
    </div>
  </section>

  <footer class="footer">
    
    <p>© 2026 Campus Merch Platform | Made for Students</p>

  </footer>

</body>

</html>
